/**:
  ros__parameters:
    use_sim_time: true

# ─── controller_manager ──────────────────────────────────────────────────────
controller_manager:
  ros__parameters:
    update_rate: 50  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_drive_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

# ─── omni_wheel_drive_controller ─────────────────────────────────────────────
#
#  Wheel layout (body frame, top view)  – MCE402 project report arrangement:
#    α_i  = wheel_offset + i·(2π/3),  wheel_offset = -π/3 = -60°
#    Wheel 1: α = -60°  (front-right)  → position ( 0.10, -0.173)
#    Wheel 2: α = +60°  (front-left)   → position ( 0.10, +0.173)
#    Wheel 3: α = 180°  (rear)         → position (-0.20,  0.000)
#
#  Inverse kinematics (body frame):
#    ωi = (1/r)[ -sin(αi)·Vx  +  cos(αi)·Vy  +  L·ω ]
#
#  Forward kinematics (MCE402 report formula – verified for this layout):
#    [Vx, Vy, ω] = (r/3) · [[√3,-√3, 0], [1, 1,-2], [1/L,1/L,1/L]] · [ω1,ω2,ω3]
#
#  Reference: MCE402 Project Report – "Omnidirectional Robot Navigation"
# ─────────────────────────────────────────────────────────────────────────────
omni_drive_controller:
  ros__parameters:
    wheel_names:
      - wheel_1_joint
      - wheel_2_joint
      - wheel_3_joint

    # Mechanical parameters (from project report)
    wheel_radius:  0.05    # r [m]  – Pololu 37D wheel
    robot_radius:  0.20    # L [m]  – centre-to-wheel contact point

    # Angular offset of wheel_1 from robot's +X axis [rad]
    # wheel_1 is at -60° = -π/3 ≈ -1.0472 rad
    wheel_offset: -1.0472

    # Odometry
    odom_frame_id:    odom
    base_frame_id:    base_link
    enable_odom_tf:   true
    open_loop:        false       # use encoder feedback for odometry
    position_feedback: true       # wheels report position (angle), not velocity

    # Velocity limits
    linear.x.has_velocity_limits:     true
    linear.x.max_velocity:            0.5    # m/s
    linear.x.min_velocity:           -0.5

    linear.y.has_velocity_limits:     true
    linear.y.max_velocity:            0.5
    linear.y.min_velocity:           -0.5

    angular.z.has_velocity_limits:    true
    angular.z.max_velocity:           2.0    # rad/s
    angular.z.min_velocity:          -2.0

    # Acceleration limits
    linear.x.has_acceleration_limits:  true
    linear.x.max_acceleration:         1.0   # m/s²
    linear.x.min_acceleration:        -1.0

    linear.y.has_acceleration_limits:  true
    linear.y.max_acceleration:         1.0
    linear.y.min_acceleration:        -1.0

    angular.z.has_acceleration_limits: true
    angular.z.max_acceleration:        2.0   # rad/s²
    angular.z.min_acceleration:       -2.0

    # cmd_vel timeout: stop if no command received within this time [s]
    cmd_vel_timeout: 0.5

    publish_rate: 50.0    # Hz – odometry publish rate
